<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="music-player">
        <div class="player-info">
            <div class="cover-art">
                <i class="fas fa-music"></i>
            </div>
            <h2 id="title">Song Title</h2>
            <h3 id="artist">Artist Name</h3>
        </div>

        <audio id="audio" src=""></audio>

        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0">
            <span id="duration">0:00</span>
        </div>

        <div class="controls">
            <button id="prev" class="btn"><i class="fas fa-backward"></i></button>
            <button id="play" class="btn play-btn"><i class="fas fa-play"></i></button>
            <button id="next" class="btn"><i class="fas fa-forward"></i></button>
        </div>

        <div class="volume-container">
            <i class="fas fa-volume-down" id="mute-icon"></i>
            <input type="range" id="volume-bar" min="0" max="1" step="0.05" value="1">
        </div>

        <div class="playlist-container">
            <h4><i class="fas fa-list"></i> Playlist</h4>
            <ul id="playlist">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
